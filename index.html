<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Promotion Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Our Site Promotion Platform</h1>
        <nav>
            <ul>
                <li><a href="#directory">Site Directory</a></li>
                <li><a href="#social">Social Media</a></li>
                <li><a href="#ads">Ads</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="form">
            <h2>Sign Up</h2>
            <form action="/submit" method="POST">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <button type="submit">Submit</button>
            </form>
        </section>
        <section id="directory">
            <h2>Site Directory</h2>
            <ul>
                <li><a href="#">Site 1</a></li>
                <li><a href="#">Site 2</a></li>
                <li><a href="#">Site 3</a></li>
            </ul>
        </section>
        <section id="social">
            <h2>Share on Social Media</h2>
            <button onclick="shareOnFacebook()">Share on Facebook</button>
            <button onclick="shareOnTwitter()">Share on Twitter</button>
            <script>
                function shareOnFacebook() {
                    window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(window.location.href));
                }
                function shareOnTwitter() {
                    window.open('https://twitter.com/intent/tweet?url=' + encodeURIComponent(window.location.href));
                }
            </script>
        </section>
        <section id="ads">
            <h2>Advertisements</h2>
            <div class="ad-space">Ad Space 1</div>
            <div class="ad-space">Ad Space 2</div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Site Promotion Platform</p>
    </footer>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #4CAF50; color: white; padding: 10px; text-align: center; }
        nav ul { list-style: none; padding: 0; }
        nav ul li { display: inline; margin-right: 15px; }
        section { margin: 20px; padding: 20px; border: 1px solid #ccc; }
        .ad-space { margin: 10px 0; border: 1px solid #000; height: 100px; text-align: center; }
    </style>
</body>
</html>
